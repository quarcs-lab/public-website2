# Site Params
[params]
home = "Home"
logo = "images/logo-white.svg"
dateFormat = "6 January 2006"
# Meta data
description = "The QuaRCS Network: interdisciplinary science and innovation for economic, social, and environmental sustainability — using spatial data science, machine learning, remote sensing, and economics."
author = "QuaRCS-lab Network"
# Google Analytics — set a real GA tracking ID here to enable analytics
googleAnalitycsID = ""
# contact form action
contactFormAction = "#" # contact form works with https://formspree.io


# Homepage About Section
[params.about]
enable  = true
title   = "ABOUT US"
content = "The QuaRCS Network is an international, interdisciplinary research network in Quantitative Regional and Computational Science. We combine development economics, spatial data science, machine learning, and satellite remote sensing to understand and inform the process of sustainable development — in its economic, social, and environmental dimensions — across subnational regions and countries. <br> <br> The QuaRCS network is part of the UN Sustainable Development Solutions Network (SDSN), mobilizing scientific knowledge and innovation to promote sustainable development worldwide."
image   = "images/about/about.png"


# Banner Section
[params.banner]
enable  = true
bgImage = "images/slider7-hires.jpg"
heading = "We conduct research about"
description = "Quantitative Regional and Computational Science"
# button
btn     = true
btnText = "Research Projects and Outcomes"
btnURL  = "research"

# The hero's rotating keywords are DERIVED from data/research-projects.yml (the item
# titles) by layouts/partials/banner.html — edit them there, not here. This block is only
# a fallback used if that data file is missing; keep it in sync if you rely on it.
# [[params.banner.flipText]]
