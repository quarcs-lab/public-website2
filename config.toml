# Shared external links — single source of truth. Templates that can read config
# (cta.html, portfolio/explainer.html) pull from here so a URL lives in ONE place.
# check-content.py asserts the socialIcon Discord url below matches params.links.discord.
[params.links]
discord     = "https://discord.gg/pfEmxwSEHy"
github      = "https://github.com/quarcs-lab/public-website2"
discussions = "https://github.com/quarcs-lab/public-website2/discussions/1"
