# Drives the homepage "Research methods" section (#feature) via layouts/partials/feature.html.
# Shares the count-agnostic .info-grid card system with Research Areas, so you can add or
# remove methods freely. Each item needs: icon (an Ionicons class, https://ionicons.com/),
# title, description. `enable: false` hides the whole section.
enable  : true
title   : Research methods and data
subtitle: Geospatial big data, spatial econometrics, and causal machine learning for sustainable development.
item    :
 - icon  : ion-ios-world-outline
   title : Geospatial Big Data
   description : >
      Large-scale spatial data — satellite imagery, nighttime lights, and remote sensing —
      processed in reproducible workflows to measure development from space.

 - icon  : ion-ios-analytics-outline
   title : Spatial econometrics
   description : >
      Exploratory spatial and space-time analysis of dependence, clustering, and regional
      heterogeneity.

 - icon  : ion-network
   title : Causal Machine Learning
   description : >
      Machine-learning methods that estimate causal effects and heterogeneous treatment
      responses, not just prediction.
