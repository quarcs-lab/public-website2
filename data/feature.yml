# Drives the homepage "Research methods" section (#feature) via layouts/partials/feature.html.
# Shares the count-agnostic .info-grid card system with Research Areas, so you can add or
# remove methods freely. Each item needs: icon (an Ionicons class, https://ionicons.com/),
# title, description. `enable: false` hides the whole section.
enable  : true
title   : Research methods
subtitle: State-of-the-art methods from spatial data science, machine learning, remote sensing, and economics.
item    :
 - icon  : ion-cube
   title : Modern data science
   description : >
      A modern, reproducible data-science workflow across all our projects.

 - icon  : ion-ios-analytics-outline
   title : Applied econometrics
   description : >
      The latest advances in applied econometrics, put to work on real questions.

 - icon  : ion-network
   title : Machine learning
   description : >
      Clustering algorithms from the unsupervised machine-learning literature.

 - icon  : ion-ios-world-outline
   title : Spatial econometrics
   description : >
      Exploratory spatial and space-time analysis, dependence, and heterogeneity.

 - icon  : ion-planet
   title : Remote sensing
   description : >
      Satellite imagery and nighttime lights to measure development from outer space.

 - icon  : ion-ios-calculator-outline
   title : Bayesian econometrics
   description : >
      Bayesian model averaging and inference under uncertainty.
