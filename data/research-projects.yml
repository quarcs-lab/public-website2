# Drives /portfolio/research-projects/ via layouts/portfolio/projects.html
# Titles mirror the homepage hero keywords (config.toml -> [[params.banner.flipText]])
# so the two surfaces stay in sync.
enable  : true
title   : Research projects
intro   : >
   Our work promotes interdisciplinary science and innovation for economic, social, and
   environmental sustainability, integrating development economics, spatial data science,
   machine learning, and satellite remote sensing to understand and inform sustainable
   development across regions and countries.
heading : Main research lines
link    : https://quarcs-lab.org/research
linkText: A more detailed description of current projects, slides, and summaries is available at quarcs-lab.org/research

items:
 - icon        : ion-ios-world-outline
   title       : Sustainable Regional Development
   description : >
      Integrate satellite remote sensing, spatial econometrics, and machine learning to
      evaluate local progress toward the Sustainable Development Goals (SDGs), quantify
      environmental trade-offs, and model regional resilience.

 - icon        : ion-ios-location-outline
   title       : The Geography of Development
   description : >
      Harness Earth observation data to map subnational wealth and health globally. This
      approach proxies economic activity, tracks poverty dynamics, and reveals spatial
      inequality in data-scarce regions.

 - icon        : ion-ios-analytics-outline
   title       : Regional Growth and Inequality
   description : >
      Apply econometrics and machine learning to analyze regional income convergence,
      identify persistent spatial poverty traps, and measure the impact of economic
      spillovers across national and subnational borders.

 - icon        : ion-shuffle
   title       : Spatial Structural Change
   description : >
      Model how localized sectoral shifts and labor productivity improvements drive regional
      development. This includes detecting economic clusters and mapping their evolutionary
      dynamics.

 - icon        : ion-ios-bolt-outline
   title       : Spatial Energy Economics
   description : >
      Quantify the spatial disparities of energy poverty and electricity access while
      mapping the localized socio-economic impacts of the transition to a low-carbon economy.
