enable  : true
title   : "Datasets, tutorials & projects"
intro   : "Open datasets, interactive explorations, hands-on tutorials, and research projects on the quantitative geography of development. Use the search box and filters to find resources by type and topic."

# Controlled vocabulary — drives the filter dropdowns (and their order)
