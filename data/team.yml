enable  : true
title   : "QuaRCS network: Directors and associates"
members  :

# ── Member schema ────────────────────────────────────────────────────────────
# Required : name, key, aliases, image, designation, description, web
#   key      : stable slug (write it literally). Used for the /people/#<key> anchor
#              and the two-way link to this person's publications. Never change it.
#   aliases  : the exact name strings as they appear in a publication's `author:`
#              field, LONGEST FIRST (e.g. "Felipe Santos-Marquez" before "Felipe
#              Santos"). Build-time matching turns those names into links and powers
#              the "Publications (N)" button on the card — so a new member with no
#              aliases gets zero linked publications. Always fill this in.
#   designation : LOAD-BEARING format "Sentence one. Role, Institution, COUNTRY."
#              The first sentence must contain "director" to land in the Directors
#              group; the trailing ALL-CAPS token becomes the country pill.
#   web      : the ONLY link field that renders (a "Website" button). net/linkedIn
#              are kept for reference but are not shown on the card.
# Deactivate a member by commenting the whole block with `#` (don't delete).
# After editing, run: python3 scripts/check-content.py
#
#  - name    : Anang Gunawan
#    key     : anang-gunawan
#    aliases : ["Anang Budi Gunawan", "Anang Gunawan"]
#    image   : images/team/team-4.jpg
#    designation : Research associate. Regional development planner, INDONESIA.
#    description : Research topic TBA
#    net         : https://www.researchgate.net/profile/Anang_Gunawan
#    linkedIn    : https://www.linkedin.com/in/anang-budi-gunawan-a934751b1/
#    web         : http://anang-gunawan.rbind.io/

# Note : The website option has been added by modifying the html code of the file themes/timer-hugo/layouts/partials/team.html
