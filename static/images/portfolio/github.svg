<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" role="img" aria-label="The QuaRCS network on GitHub">
  <defs>
    <linearGradient id="ghBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1024"/>
      <stop offset="0.55" stop-color="#0f1836"/>
      <stop offset="1" stop-color="#131f47"/>
    </linearGradient>
    <radialGradient id="ghCyan" cx="0.18" cy="0.12" r="0.65">
      <stop offset="0" stop-color="#2ed6ee" stop-opacity="0.30"/>
      <stop offset="0.6" stop-color="#2ed6ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ghAmber" cx="0.9" cy="0.92" r="0.6">
      <stop offset="0" stop-color="#ffb84d" stop-opacity="0.16"/>
      <stop offset="0.7" stop-color="#ffb84d" stop-opacity="0"/>
    </radialGradient>
    <filter id="ghGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Official GitHub mark, scaled to ~300px and centered -->
    <path id="ghMark" transform="translate(450,196) scale(12.5)" d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 6.836c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.91 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222 0 1.606-.014 2.898-.014 3.293 0 .322.216.694.825.576C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
  </defs>

  <rect width="1200" height="800" fill="url(#ghBg)"/>
  <rect width="1200" height="800" fill="url(#ghCyan)"/>
  <rect width="1200" height="800" fill="url(#ghAmber)"/>

  <!-- Faint commit-graph motif -->
  <g fill="none" stroke="#2ed6ee" stroke-opacity="0.28" stroke-width="3">
    <path d="M150 640 L150 470 Q150 430 190 430 L300 430"/>
    <path d="M1050 170 L1050 330 Q1050 370 1010 370 L905 370"/>
  </g>
  <g>
    <circle cx="150" cy="640" r="12" fill="#2ed6ee" fill-opacity="0.55"/>
    <circle cx="150" cy="470" r="9" fill="#2ed6ee" fill-opacity="0.40"/>
    <circle cx="300" cy="430" r="12" fill="#ffb84d" fill-opacity="0.60"/>
    <circle cx="1050" cy="170" r="12" fill="#2ed6ee" fill-opacity="0.50"/>
    <circle cx="1050" cy="330" r="9" fill="#2ed6ee" fill-opacity="0.35"/>
    <circle cx="905" cy="370" r="12" fill="#ffb84d" fill-opacity="0.55"/>
  </g>

  <!-- GitHub mark: cyan glow behind, near-white on top -->
  <use href="#ghMark" fill="#2ed6ee" fill-opacity="0.55" filter="url(#ghGlow)"/>
  <use href="#ghMark" fill="#eef2fb"/>
</svg>
